# Curated vendor catalog powering the consistent randomization profile.
# The `vendor` field on OUI entries is matched against the `sys_vendor`
# field on DMI presets to produce a coherent fake hardware identity.
#
# OUI prefixes are sourced from the IEEE OUI registry. Only well-known
# assignments for major hardware vendors are included.

# ---------------------------------------------------------------------------
# OUI (Organizationally Unique Identifier) prefixes
# ---------------------------------------------------------------------------
# Each entry maps an IEEE-assigned OUI prefix to a vendor name.
# The `vendor` field must match a DMI preset's `sys_vendor` for the
# consistent profile to produce a coherent MAC+DMI combination.

